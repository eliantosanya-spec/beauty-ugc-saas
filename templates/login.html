{% extends "base.html" %}
{% set title = "店舗ログイン" %}
{% block content %}
<section class="max-w-sm mx-auto mt-8">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
    <div class="text-center mb-2">
      <div class="w-14 h-14 bg-brand-100 rounded-full flex items-center justify-center mx-auto mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-brand-600" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-6-3a2 2 0 11-4 0 2 2 0 014 0zm-2 4a5 5 0 00-4.546 2.916A5.986 5.986 0 0010 16a5.986 5.986 0 004.546-2.084A5 5 0 0010 11z" clip-rule="evenodd"/></svg>
      </div>
      <p class="text-sm text-gray-500">Beauty UGC SaaS</p>
    </div>
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm alert-dismiss">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス</label>
        <input name="email" type="email" value="demo@example.com" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-base">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">パスワード</label>
        <input name="password" type="password" value="password123" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-base">
      </div>
      <button type="submit" class="w-full bg-brand-600 text-white font-medium py-3 rounded-lg hover:bg-brand-700 transition active:scale-[0.98]">ログイン</button>
    </form>
    <p class="text-xs text-center text-gray-400">デモ: demo@example.com / password123</p>
  </div>
</section>
{% endblock %}
