{% extends "base.html" %}
{% set title = "データ保存" %}
{% set active_nav = "backup" %}
{% block content %}
<div class="max-w-lg mx-auto space-y-4">
  <!-- Export -->
  <div class="bg-white rounded-xl border border-gray-200 p-5 space-y-3">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a1 1 0 00-1 1v10.586l-2.293-2.293a1 1 0 00-1.414 1.414l4 4a1 1 0 001.414 0l4-4a1 1 0 00-1.414-1.414L11 13.586V3a1 1 0 00-1-1z"/><path d="M3 16a1 1 0 011 1h12a1 1 0 011-1 1 1 0 00-1-1H4a1 1 0 00-1 1z" clip-rule="evenodd"/></svg>
      </div>
      <div>
        <h2 class="font-bold text-gray-800">JSON バックアップをダウンロード</h2>
        <p class="text-sm text-gray-500">店舗設定・ユーザー・投稿データをすべてJSONで保存</p>
      </div>
    </div>
    <a href="/api/backup" download
       class="block w-full text-center bg-brand-600 text-white font-medium py-3 rounded-lg hover:bg-brand-700 transition active:scale-[0.98]">
      バックアップをダウンロード
    </a>
  </div>

  <!-- Import -->
  <div class="bg-white rounded-xl border border-gray-200 p-5 space-y-3">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-600" viewBox="0 0 20 20" fill="currentColor"><path d="M10 18a1 1 0 001-1V6.414l2.293 2.293a1 1 0 001.414-1.414l-4-4a1 1 0 00-1.414 0l-4 4a1 1 0 001.414 1.414L9 6.414V17a1 1 0 001 1z"/><path d="M3 18h14a1 1 0 010 2H3a1 1 0 010-2z"/></svg>
      </div>
      <div>
        <h2 class="font-bold text-gray-800">JSON から復元</h2>
        <p class="text-sm text-gray-500">バックアップファイルをアップロードしてデータを復元</p>
      </div>
    </div>
    <form id="restore-form" class="space-y-3">
      <div class="flex items-center gap-3">
        <label class="flex-1 cursor-pointer">
          <input type="file" id="restore-file" accept=".json" required
                 class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-amber-50 file:text-amber-600 hover:file:bg-amber-100">
        </label>
      </div>
      <div class="flex gap-3">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="mode" value="merge" checked class="w-4 h-4 text-brand-600">
          <span class="text-sm text-gray-600">マージ（既存データを保持）</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="mode" value="replace" class="w-4 h-4 text-red-500">
          <span class="text-sm text-red-600">置き換え（全データを削除して復元）</span>
        </label>
      </div>
      <button type="submit" class="w-full bg-amber-600 text-white font-medium py-3 rounded-lg hover:bg-amber-700 transition active:scale-[0.98]">
        復元する
      </button>
    </form>
    <div id="restore-result" class="hidden"></div>
  </div>
</div>

<script>
document.getElementById('restore-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fileInput = document.getElementById('restore-file');
  const mode = document.querySelector('input[name="mode"]:checked').value;
  const resultDiv = document.getElementById('restore-result');
  const btn = e.target.querySelector('button[type="submit"]');

  if (!fileInput.files[0]) {
    alert('ファイルを選択してください。');
    return;
  }

  const form = new FormData();
  form.append('backup', fileInput.files[0]);
  form.append('mode', mode);

  btn.disabled = true;
  btn.textContent = '復元中...';
  resultDiv.className = 'hidden';

  try {
    const res = await fetch('/api/restore', { method: 'POST', body: form });
    const data = await res.json();
    if (data.ok) {
      resultDiv.className = 'bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm';
      resultDiv.innerHTML = `復元完了！店舗: ${data.imported.stores}件, ユーザー: ${data.imported.users}件, 投稿: ${data.imported.submissions}件`;
    } else {
      resultDiv.className = 'bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm';
      resultDiv.textContent = data.error || '復元に失敗しました';
    }
  } catch (err) {
    resultDiv.className = 'bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm';
    resultDiv.textContent = '通信エラーが発生しました';
  } finally {
    btn.disabled = false;
    btn.textContent = '復元する';
    resultDiv.classList.remove('hidden');
  }
});
</script>
{% endblock %}
